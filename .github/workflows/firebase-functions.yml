- name: Deploy functions and Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          echo "=== Directorio actual ==="
          pwd
          echo "=== Archivos en raiz ==="
          ls -la
          echo "=== Contenido firebase.json ==="
          cat firebase.json
          echo "=== Deploy ==="
          firebase deploy --only functions,firestore:rules --project mmpueblito-8fb29 --non-interactive
