name: Deploy Firebase Functions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firestore.rules"
      - "firebase.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm install --prefix functions

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MMPUEBLITO }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Falta el secret FIREBASE_SERVICE_ACCOUNT_MMPUEBLITO"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          node -e "JSON.parse(require('fs').readFileSync(process.env.RUNNER_TEMP + '/firebase-service-account.json', 'utf8')); console.log('Service account JSON OK')"

      - name: Check Firebase access
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          node --version
          firebase --version
          firebase projects:list --json

      - name: Deploy functions and Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          echo "=== Directorio actual ==="
          pwd
          echo "=== Archivos en raiz ==="
          ls -la
          echo "=== Contenido firebase.json ==="
          cat firebase.json
          echo "=== Deploy ==="
          firebase deploy --only functions,firestore:rules --project mmpueblito-8fb29 --non-interactive --force
