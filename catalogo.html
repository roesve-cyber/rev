<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .producto {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 15px;
      background: #fff;
      text-align: center;
      transition: transform 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .producto:hover { transform: translateY(-5px); }
    .producto h3 { margin: 10px 0; font-size: 15px; color: #333; height: 40px; overflow: hidden; }
    .precio { font-weight: bold; color: #27ae60; font-size: 20px; margin: 10px 0; }
    .caract { font-size: 11px; color: #777; text-align: left; height: 50px; overflow: hidden; border-top: 1px solid #f9f9f9; padding-top: 8px; }
  </style>
</head>
<body>

<h1 style="text-align:center; font-family: sans-serif; color: #2c3e50;">🛍️ Catálogo de Productos</h1>

<div id="productos" class="grid"></div>

<script>
// 1. Obtener productos de la base local
const productosRaw = localStorage.getItem("productos");
const productos = JSON.parse(productosRaw) || [];
const contenedor = document.getElementById("productos");

console.log("📦 Datos en LocalStorage:", productos.length, "ítems");

// 2. Configuración de categorías (Tal cual aparecen en tu consola)
const categoriasABuscar = ["Muebles", "Colchones"];
const permitidasMin = categoriasABuscar.map(c => c.toLowerCase());

// 3. Filtrar
const filtrados = productos.filter(p => {
    // Forzamos minúsculas para evitar errores de dedo
    const catDoc = (p.categoria || "").trim().toLowerCase();
    const esValida = permitidasMin.includes(catDoc);
    
    // Si la propiedad 'Activo' no existe, lo mostramos por defecto
    const estaActivo = p.Activo !== 0; 

    return esValida && estaActivo;
});

console.log("✅ Productos que pasaron el filtro:", filtrados.length);

// 4. Mostrar en pantalla
if (filtrados.length === 0) {
    contenedor.innerHTML = `
        <div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #95a5a6;">
            <h3>No hay productos para mostrar</h3>
            <p>Categorías buscadas: ${categoriasABuscar.join(", ")}</p>
            <small>Verifica que los productos tengan estas categorías en el inventario.</small>
        </div>`;
} else {
    contenedor.innerHTML = filtrados.map(p => {
        const foto = p.imagen || "https://via.placeholder.com/200?text=Sin+Foto";
        const precioNum = parseFloat(p.precio || 0);
        const caracteristicasCorta = p.caracteristicas 
            ? p.caracteristicas.substring(0, 70).replace(/\n/g, ' ') + '...'
            : 'Sin descripción disponible';

        return `
            <div class="producto">
                <div style="height:160px; display:flex; align-items:center; justify-content:center;">
                    <img src="${foto}" style="max-width:100%; max-height:100%; object-fit:contain;">
                </div>
                <h3>${p.nombre || "Producto sin nombre"}</h3>
                <div class="caract">${caracteristicasCorta}</div>
                <p class="precio">$${precioNum.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
            </div>
        `;
    }).join('');
}
</script>

</body>
</html>
