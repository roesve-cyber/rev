<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>

  <link rel="stylesheet" href="/estilos.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .producto {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      text-align: center;
    }

    .producto h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .precio {
      font-weight: bold;
      color: green;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1 style="text-align:center;">🛍️ Catálogo de Productos</h1>

<div id="productos" class="grid"></div>

<script>
// 📦 Obtener productos reales del sistema
const productos = JSON.parse(localStorage.getItem("productos")) || [];

const contenedor = document.getElementById("productos");

// 👉 CONFIGURA AQUÍ LAS CATEGORÍAS QUE QUIERES MOSTRAR
const categoriasPermitidas = ["Salas", "Recámaras","Comedores", "Antecomedores", "Roperos", "Comoda", "Comodas", "Roperos", "Camas", "Roperos"];

// 🔍 Filtrar productos
const filtrados = productos.filter(p => 
  p.Activo !== 0 &&
  categoriasPermitidas.includes(p.Categoria)
);

// 🧠 Si no hay productos
if (filtrados.length === 0) {
  contenedor.innerHTML = "<p style='text-align:center;'>No hay productos disponibles</p>";
}

// 🎯 Mostrar productos
filtrados.forEach(p => {

  const div = document.createElement("div");
  div.className = "producto";

  div.innerHTML = `
    <h3>${p.Nombre}</h3>
    <p class="precio">$${p.Precio_Contado}</p>
  `;

  contenedor.appendChild(div);
});
</script>

</body>
</html>
