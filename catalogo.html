<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUEBLERIA MI PUEBLITO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary: #1a2a27; --accent: #b8842a; --bg-cream: #faf7f2; --white: #ffffff;
  --font-main: 'Inter', sans-serif; --font-title: 'Montserrat', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-main); background-color: var(--bg-cream); color: #1a1a1a; }

/* HEADER & HERO */
.site-header {
  background: var(--white); padding: 12px 40px; display: flex;
  justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
  position: sticky; top: 0; z-index: 1000;
}
.brand h1 { font-family: var(--font-title); font-size: 18px; color: var(--primary); }
.top-benefits { display: flex; gap: 20px; }
.benefit-pill { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }

.hero-slim {
  padding: 30px 20px; background: #111; color: white; text-align: center;
  background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&q=80&w=1500');
  background-size: cover; background-position: center;
}
.hero-slim h2 { font-family: var(--font-title); font-size: 28px; margin-bottom: 5px; }
.hero-slim p { font-size: 15px; opacity: 0.9; }

/* FILTROS */
.filter-section { padding: 20px 40px; max-width: 1400px; margin: 0 auto; text-align: center; }
.cat-btn {
  padding: 8px 20px; border-radius: 50px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-weight: 600; margin: 5px; transition: 0.3s;
}
.cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.subnav { 
  display: none; justify-content: center; flex-wrap: wrap; gap: 8px; 
  margin-top: 15px; padding: 10px; border-top: 1px solid #eee;
}
.subnav.visible { display: flex; }
.sub-pill {
  padding: 5px 15px; background: #eee; border-radius: 20px; font-size: 12px;
  cursor: pointer; font-weight: 500;
}
.sub-pill.active { background: var(--accent); color: white; }

/* CATALOGO */
.catalog-container { max-width: 1400px; margin: 0 auto; padding: 0 40px 60px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
.card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
.card-img { height: 220px; padding: 20px; display: flex; align-items: center; justify-content: center; }
.card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.card-body { padding: 15px; border-top: 1px solid #f9f9f9; }
.card-body h3 { font-size: 14px; color: #444; margin-bottom: 5px; height: 34px; overflow: hidden; }
.card-price { font-size: 18px; font-weight: 800; color: var(--primary); }

/* MODAL */
.modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
  z-index: 2000; align-items: center; justify-content: center; padding: 20px;
}
.modal.open { display: flex; }
.modal-content {
  background: white; width: 100%; max-width: 950px; border-radius: 15px; 
  display: flex; overflow: hidden; position: relative; max-height: 90vh;
}
.modal-left { flex: 1.2; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
.modal-left img { width: 100%; transition: transform 0.1s ease; }
.modal-right { flex: 1; padding: 30px; overflow-y: auto; }

.periodicidad-select {
  width: 100%; padding: 10px; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd;
}
.plazo-row {
  display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee;
}

.btn-wa {
  display: block; width: 100%; background: #25d366; color: white; text-align: center;
  padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 700; margin-top: 20px;
}

@media (max-width: 768px) {
  .modal-content { flex-direction: column; overflow-y: auto; }
  .modal-left { height: 250px; }
  .grid { grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand"><h1>MUEBLERIA MI PUEBLITO</h1></div>
  <div class="top-benefits">
    <div class="benefit-pill">🛡️ Calidad</div>
    <div class="benefit-pill">🗓️ Abonos</div>
  </div>
</header>

<section class="hero-slim">
  <h2>Tu hogar, tu estilo.</h2>
  <p>Encuentra los mejores muebles con abonos que sí puedes.</p>
</section>

<div class="filter-section">
  <div id="categoriasNav">
    <button class="cat-btn active" onclick="setCategoria('todos', this)">Todos</button>
  </div>
  <div id="subnav" class="subnav"></div>
</div>

<main class="catalog-container">
  <div id="grid" class="grid"></div>
</main>

<div class="modal" id="modal" onclick="if(event.target==this) cerrarModal()">
  <div class="modal-content">
    <button onclick="cerrarModal()" style="position:absolute; top:15px; right:15px; border:none; background:white; width:30px; height:30px; border-radius:50%; cursor:pointer; z-index:10; font-weight:bold;">✕</button>
    <div class="modal-left" id="zoomC" onmousemove="zoom(event)" onmouseleave="resetZoom()">
      <img id="mImg" src="">
    </div>
    <div class="modal-right">
      <h2 id="mTitle" style="font-family:var(--font-title);"></h2>
      <div id="mPrice" style="font-size:24px; font-weight:800; color:var(--primary); margin:10px 0;"></div>
      
      <label style="font-size:11px; font-weight:700;">FORMA DE PAGO:</label>
      <select id="periodoSelect" class="periodicidad-select" onchange="actualizarPlazos()">
        <option value="semanal">Semanal</option>
        <option value="quincenal">Quincenal</option>
        <option value="mensual">Mensual</option>
      </select>

      <div id="plazosLista"></div>
      <a id="btnWA" href="#" target="_blank" class="btn-wa">Cotizar por WhatsApp</a>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyALvu7jMIiwJy2zY96fmeQR9M_tLR6mDUI",
  authDomain: "mmpueblito-8fb29.firebaseapp.com",
  projectId: "mmpueblito-8fb29",
  storageBucket: "mmpueblito-8fb29.firebasestorage.app",
  messagingSenderId: "32950655624",
  appId: "1:32950655624:web:42a8657431319f9a25dd3d"
};

let productos = [];
let catActiva = 'todos';
let subActiva = 'todos';
let prodSeleccionado = null;

const fmt = (n) => parseFloat(n || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

// --- LÓGICA DE CÁLCULO SOLICITADA ---
const LogicaCredito = {
  calcularCredito(precio) {
    let resultados = [];
    let totalAnterior = 0;
    for (let m = 1; m <= 6; m++) {
      let tasa = (m <= 3) ? 0.02 : 0.025;
      let totalBase = precio * (1 + (tasa * m));
      let semanas = m * 4;
      let pagoSemanal = totalBase / semanas;
      pagoSemanal = Math.ceil(pagoSemanal / 10) * 10;
      let totalFinal = pagoSemanal * semanas;
      let intentos = 0;
      while (totalFinal <= totalAnterior && intentos++ < 100) {
        pagoSemanal += 5;
        totalFinal = pagoSemanal * semanas;
      }
      if (intentos >= 100) continue;
      totalAnterior = totalFinal;
      resultados.push({ meses: m, semanas, abono: pagoSemanal, total: totalFinal });
    }
    return resultados;
  },
  calcularConPeriodicidad(precio, periodicidad = 'semanal') {
    const planesSemanales = this.calcularCredito(precio);
    let mult = 1;
    if (periodicidad === 'quincenal') mult = 2;
    if (periodicidad === 'mensual') mult = 4;
    return planesSemanales.map(plan => ({
      meses: plan.meses,
      pagos: Math.round(plan.semanas / mult),
      abono: plan.abono * mult
    }));
  }
};

async function inicializar() {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const doc = await firebase.firestore().collection('posData').doc('productos').get();
  productos = (doc.data().data || []).filter(p => p.Activo != 0);
  
  const cats = [...new Set(productos.map(p => p.categoria || "Varios"))];
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    btn.onclick = () => setCategoria(c, btn);
    document.getElementById('categoriasNav').appendChild(btn);
  });
  render();
}

function setCategoria(c, btn) {
  catActiva = c;
  subActiva = 'todos';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const subnav = document.getElementById('subnav');
  if (c === 'todos') {
    subnav.classList.remove('visible');
  } else {
    const subs = [...new Set(productos.filter(p => p.categoria === c).map(p => p.subcategoria).filter(s => s))];
    subnav.innerHTML = `<div class="sub-pill active" onclick="setSub('todos', this)">Ver Todo</div>` + 
      subs.map(s => `<div class="sub-pill" onclick="setSub('${s}', this)">${s}</div>`).join('');
    subnav.classList.add('visible');
  }
  render();
}

function setSub(s, pill) {
  subActiva = s;
  document.querySelectorAll('.sub-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const filtrados = productos.filter(p => {
    const matchCat = catActiva === 'todos' || p.categoria === catActiva;
    const matchSub = subActiva === 'todos' || p.subcategoria === subActiva;
    return matchCat && matchSub;
  });
  
  grid.innerHTML = filtrados.map(p => `
    <div class="card" onclick="abrirModal('${p.id}')">
      <div class="card-img"><img src="${p.imagen}" loading="lazy"></div>
      <div class="card-body">
        <h3>${p.nombre}</h3>
        <div class="card-price">${fmt(p.precio)}</div>
      </div>
    </div>
  `).join('');
}

function abrirModal(id) {
  prodSeleccionado = productos.find(x => x.id == id);
  document.getElementById('mImg').src = prodSeleccionado.imagen;
  document.getElementById('mTitle').textContent = prodSeleccionado.nombre;
  document.getElementById('mPrice').textContent = fmt(prodSeleccionado.precio) + " de contado";
  document.getElementById('periodoSelect').value = 'semanal';
  actualizarPlazos();
  
  const msg = encodeURIComponent(`Hola! Me interesa: ${prodSeleccionado.nombre} (${fmt(prodSeleccionado.precio)})`);
  document.getElementById('btnWA').href = `https://wa.me/522411081657?text=${msg}`;
  document.getElementById('modal').classList.add('open');
}

function actualizarPlazos() {
  const periodicidad = document.getElementById('periodoSelect').value;
  const plazos = LogicaCredito.calcularConPeriodicidad(parseFloat(prodSeleccionado.precio), periodicidad);
  
  document.getElementById('plazosLista').innerHTML = plazos.map(pl => `
    <div class="plazo-row">
      <span><strong>${pl.pagos}</strong> pagos de <strong>${fmt(pl.abono)}</strong></span>
      <span style="font-size:11px; color:var(--accent); font-weight:700;">A ${pl.meses} MESES</span>
    </div>
  `).join('');
}

function cerrarModal() { document.getElementById('modal').classList.remove('open'); }

function zoom(e) {
  const container = document.getElementById('zoomC');
  const img = document.getElementById('mImg');
  const rect = container.getBoundingClientRect();
  img.style.transformOrigin = `${((e.clientX - rect.left)/rect.width)*100}% ${((e.clientY - rect.top)/rect.height)*100}%`;
  img.style.transform = "scale(2)";
}
function resetZoom() { document.getElementById('mImg').style.transform = "scale(1)"; }

inicializar();
</script>
</body>
</html>
