<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>

  <link rel="stylesheet" href="/estilos.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .producto {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      text-align: center;
    }

    .producto h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .precio {
      font-weight: bold;
      color: green;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1 style="text-align:center;">🛍️ Catálogo de Productos</h1>

<div id="productos" class="grid"></div>

<script>
<script>
// 1. Tus categorías tal como las piensas (puedes poner mayúsculas aquí)
const categoriasABuscar = ["Muebles", "Colchones"];

// 2. Pasamos TODA esa lista a minúsculas automáticamente para no fallar
const permitidasMin = categoriasABuscar.map(c => c.toLowerCase());

// 3. Filtrar
const filtrados = productos.filter(p => {
    // Obtenemos la categoría del producto (venga como p.categoria o p.Categoria)
    // y la pasamos a minúsculas también
    const catProducto = (p.categoria || p.Categoria || "").trim().toLowerCase();
    
    const esValida = permitidasMin.includes(catProducto);
    const estaActivo = p.Activo !== 0;

    return esValida && estaActivo;
});

console.log("Categorías encontradas en tu base:", productos.map(p => p.categoria || p.Categoria));
console.log("Productos tras el filtro:", filtrados.length);

// 4. Si no hay productos, mostrar mensaje
if (filtrados.length === 0) {
    contenedor.innerHTML = `
        <div style="grid-column: 1 / -1; text-align: center; padding: 50px;">
            <p style="color: #666; font-size: 18px;">No hay productos disponibles en las categorías: <b>${categoriasPermitidas.join(", ")}</b></p>
            <small style="color: #999;">Asegúrate de que los productos en tu inventario tengan estas categorías asignadas exactamente.</small>
        </div>`;
}

// 5. Renderizar productos
filtrados.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    
    const foto = p.imagen || "https://via.placeholder.com/200?text=Sin+Foto";
    const nombre = p.nombre || p.Nombre || "Producto sin nombre";
    const precio = parseFloat(p.precio || p.Precio_Contado || 0);
    
    const textoCaracteristicas = p.caracteristicas 
        ? p.caracteristicas.replace(/\n/g, '<br>') 
        : '<em>Sin detalles adicionales</em>';

    div.innerHTML = `
        <div style="height:180px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; background:#f9f9f9; border-radius:8px;">
            <img src="${foto}" style="max-width:100%; max-height:100%; object-fit:contain;">
        </div>
        <h3 style="height: 40px; overflow: hidden; font-size: 14px;">${nombre}</h3>
        <div style="font-size:11px; color:#888; margin:10px 0; text-align:left; border-top:1px solid #eee; padding-top:8px; height: 60px; overflow-y: auto;">
            ${textoCaracteristicas}
        </div>
        <p class="precio">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
    `;
    contenedor.appendChild(div);
});
</script>

</body>
</html>
