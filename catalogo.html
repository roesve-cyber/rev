<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUEBLERIA MI PUEBLITO — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2c3e3a; /* Verde oscuro elegante */
  --accent: #b8842a;
  --text-dark: #1a1a1a;
  --text-light: #64748b;
  --bg-cream: #faf7f2;
  --white: #ffffff;
  --font-main: 'Inter', sans-serif;
  --font-title: 'Montserrat', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background-color: var(--bg-cream);
  color: var(--text-dark);
}

/* --- HEADER --- */
.site-header {
  background: var(--white);
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.brand h1 {
  font-family: var(--font-title);
  font-size: 20px;
  color: var(--primary);
  letter-spacing: 1px;
}

.top-benefits {
  display: flex;
  gap: 30px;
}

.benefit-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
}

.benefit-pill span {
  font-size: 18px;
}

/* --- HERO DARK --- */
.hero {
  position: relative;
  height: 350px;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
              url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&q=80&w=1500');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: var(--white);
}

.hero h2 {
  font-family: var(--font-title);
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
  max-width: 600px;
  font-weight: 300;
  opacity: 0.9;
}

/* --- FILTROS --- */
.filter-bar {
  padding: 30px 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.cat-container {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
  justify-content: center;
}

.cat-btn {
  padding: 10px 20px;
  border-radius: 50px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
  transition: 0.3s;
}

.cat-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* --- GRID PRODUCTOS --- */
.catalog-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 30px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: transform 0.3s;
}

.card:hover { transform: translateY(-5px); }

.card-img {
  height: 220px;
  padding: 20px;
  background: #f9f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-img img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.card-body { padding: 20px; }

.card-body h3 {
  font-size: 16px;
  margin-bottom: 8px;
  height: 40px;
  overflow: hidden;
}

.price-cash {
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 15px;
}

.installments-box {
  background: #f1f5f4;
  padding: 12px;
  border-radius: 10px;
}

.inst-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 5px;
}

.inst-row strong { color: #1a1a1a; }

.badge-months {
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .site-header { flex-direction: column; gap: 15px; padding: 20px; }
  .top-benefits { gap: 15px; flex-wrap: wrap; justify-content: center; }
  .hero h2 { font-size: 32px; }
  .grid { grid-template-columns: 1fr 1fr; gap: 15px; }
  .catalog-container { padding: 0 15px 40px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">
    <h1>MUEBLERIA MI PUEBLITO</h1>
  </div>
  <div class="top-benefits">
    <div class="benefit-pill"><span>🛡️</span> Calidad Garantizada</div>
    <div class="benefit-pill"><span>🗓️</span> Pagos Semanales</div>
    <div class="benefit-pill"><span>🤝</span> Atención Personal</div>
  </div>
</header>

<section class="hero">
  <h2>Tu hogar, tu estilo.</h2>
  <p>Muebles y colchones de alta calidad con planes de pago semanales diseñados para ti.</p>
</section>

<div class="filter-bar">
  <div id="categoriasNav" class="cat-container">
    <button class="cat-btn active" onclick="filtrarPorCat('todos', this)">Todos los productos</button>
  </div>
</div>

<main class="catalog-container">
  <div id="gridProductos" class="grid"></div>
</main>

<script>
let todosLosProductos = [];
let catActual = 'todos';

const fmt = (n) => parseFloat(n || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

// LA FÓRMULA DEL NEGOCIO
function calcularPlazos(precio) {
  if (precio <= 1) return null; // Regla de precio 1

  const plazos = [
    { sem: 4, meses: 1 },
    { sem: 12, meses: 3 },
    { sem: 24, meses: 6 }
  ];

  return plazos.map(p => {
    const tasa = p.sem <= 12 ? 0.08 : 0.15;
    const totalConInteres = precio * (1 + tasa);
    // Redondeo al múltiplo de 5 superior (Importante para cobranza)
    const abonoSemanal = Math.ceil((totalConInteres / p.sem) / 5) * 5;
    
    return {
      cuota: abonoSemanal,
      meses: p.meses
    };
  });
}

async function inicializar() {
  const data = JSON.parse(localStorage.getItem("productos")) || [];
  // Limpiar y normalizar datos
  todosLosProductos = data.filter(p => p.Activo !== 0);
  
  generarCategorias();
  render();
}

function generarCategorias() {
  const nav = document.getElementById('categoriasNav');
  const categoriasUnicas = [...new Set(todosLosProductos.map(p => (p.categoria || p.Categoria || "Otros").trim()))];
  
  categoriasUnicas.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.onclick = () => filtrarPorCat(cat, btn);
    nav.appendChild(btn);
  });
}

function filtrarPorCat(cat, btn) {
  catActual = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const grid = document.getElementById('gridProductos');
  const filtrados = todosLosProductos.filter(p => {
    const pCat = (p.categoria || p.Categoria || "Otros").trim();
    return catActual === 'todos' || pCat === catActual;
  });

  grid.innerHTML = filtrados.map(p => {
    const precio = parseFloat(p.precio || p.Precio_Contado || 0);
    const plazos = calcularPlazos(precio);
    
    return `
      <div class="card">
        <div class="card-img">
          <img src="${p.imagen || 'https://via.placeholder.com/300?text=Sin+Imagen'}" alt="${p.nombre}">
        </div>
        <div class="card-body">
          <h3>${p.nombre || p.Nombre}</h3>
          <div class="price-cash">${fmt(precio)} <small style="font-size:10px; color:#999; font-weight:400">CONTADO</small></div>
          
          ${plazos ? `
            <div class="installments-box">
              <p style="font-size:11px; font-weight:700; color:#666; margin-bottom:8px">PLANES SEMANALES</p>
              ${plazos.map(pl => `
                <div class="inst-row">
                  <strong>${fmt(pl.cuota)} <span style="font-weight:400; font-size:11px">semanal</span></strong>
                  <span class="badge-months">a ${pl.meses} ${pl.meses === 1 ? 'mes' : 'meses'}</span>
                </div>
              `).join('')}
            </div>
          ` : '<p style="color:#999; font-size:12px; font-style:italic">Venta solo de contado</p>'}
        </div>
      </div>
    `;
  }).join('');
}

window.onload = inicializar;
</script>

</body>
</html>
