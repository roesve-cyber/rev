<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    /* --- Estilos del Grid --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
    
    .producto { 
      border: 1px solid #eee; border-radius: 12px; padding: 15px; background: #fff; 
      text-align: center; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex; flex-direction: column; justify-content: space-between;
    }

    .producto h3 { font-size: 15px; color: #333; margin: 10px 0; height: 40px; overflow: hidden; }
    .precio { font-weight: bold; color: #27ae60; font-size: 20px; margin: 10px 0; }

    /* --- El Botón --- */
    .btn-detalle {
      background-color: #0d6efd; color: white; border: none; padding: 10px;
      border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;
    }
    .btn-detalle:hover { background-color: #0a58ca; }

    /* --- Estilos del Modal (Ventana Emergente) --- */
    .modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
    }
    .modal-contenido {
      background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px;
      position: relative; text-align: center; max-height: 90vh; overflow-y: auto;
    }
    .cerrar { position: absolute; right: 15px; top: 10px; font-size: 25px; cursor: pointer; color: #888; }
  </style>
</head>
<body>

<h1 style="text-align:center; font-family: sans-serif;">🛍️ Catálogo Mi Pueblito</h1>

<div id="productos" class="grid"></div>

<div id="miModal" class="modal">
  <div class="modal-contenido">
    <span class="cerrar" onclick="cerrarModal()">&times;</span>
    <img id="modalImagen" src="" style="width: 100%; max-height: 250px; object-fit: contain; border-radius: 10px;">
    <h2 id="modalNombre" style="margin: 15px 0;"></h2>
    <p id="modalPrecio" style="font-size: 24px; color: #27ae60; font-weight: bold;"></p>
    <div id="modalDesc" style="text-align: left; color: #555; background: #f9f9f9; padding: 15px; border-radius: 8px;"></div>
  </div>
</div>

<script>
// 1. Datos
const productos = JSON.parse(localStorage.getItem("productos")) || [];
const contenedor = document.getElementById("productos");

const categoriasABuscar = ["Muebles", "Colchones"];
const permitidasMin = categoriasABuscar.map(c => c.toLowerCase());

// 2. Filtrar
const filtrados = productos.filter(p => {
    const catDoc = (p.categoria || "").trim().toLowerCase();
    return permitidasMin.includes(catDoc) && p.Activo !== 0;
});

// 3. Renderizar Tarjetas
if (filtrados.length === 0) {
    contenedor.innerHTML = "<h3>No hay productos disponibles.</h3>";
} else {
    contenedor.innerHTML = filtrados.map(p => {
        const foto = p.imagen || "https://via.placeholder.com/200?text=Sin+Foto";
        const precioNum = parseFloat(p.precio || 0);
        
        return `
            <div class="producto">
                <div style="height:150px; display:flex; align-items:center; justify-content:center;">
                    <img src="${foto}" style="max-width:100%; max-height:100%; object-fit:contain;">
                </div>
                <h3>${p.nombre || "Sin nombre"}</h3>
                <p class="precio">$${precioNum.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                <button class="btn-detalle" onclick="verDetalle('${p.id}')">Ver Detalles</button>
            </div>
        `;
    }).join('');
}

// 4. Lógica del Modal
function verDetalle(id) {
    const p = productos.find(item => item.id == id);
    if (!p) return;

    document.getElementById("modalImagen").src = p.imagen || "https://via.placeholder.com/200";
    document.getElementById("modalNombre").innerText = p.nombre;
    document.getElementById("modalPrecio").innerText = "$" + parseFloat(p.precio || 0).toLocaleString('es-MX', {minimumFractionDigits: 2});
    
    // Convertir saltos de línea para la descripción
    const textoHtml = p.caracteristicas ? p.caracteristicas.replace(/\n/g, '<br>') : "Sin detalles.";
    document.getElementById("modalDesc").innerHTML = `
        <strong>Categoría:</strong> ${p.categoria}<br>
        <strong>Subcategoría:</strong> ${p.subcategoria || 'N/A'}<br><br>
        ${textoHtml}
    `;

    document.getElementById("miModal").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("miModal").style.display = "none";
}

// Cerrar si hacen clic fuera del cuadro blanco
window.onclick = function(event) {
  if (event.target == document.getElementById("miModal")) {
    cerrarModal();
  }
}
</script>

</body>
</html>
