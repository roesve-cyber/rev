<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>

  <link rel="stylesheet" href="/estilos.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .producto {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      text-align: center;
    }

    .producto h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .precio {
      font-weight: bold;
      color: green;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1 style="text-align:center;">🛍️ Catálogo de Productos</h1>

<div id="productos" class="grid"></div>

<script>
<script>
// 1. Obtener productos
const productos = JSON.parse(localStorage.getItem("productos")) || [];
const contenedor = document.getElementById("productos");

// 2. Categorías que queremos mostrar (No importa si escribes Mayúsculas aquí)
const categoriasABuscar = ["Muebles", "Colchones"];
// Las convertimos a minúsculas para comparar sin errores
const permitidasMin = categoriasABuscar.map(c => c.toLowerCase());

// 3. Filtrar productos
const filtrados = productos.filter(p => {
    // Según tu consola, la propiedad se llama "categoria"
    const catProducto = (p.categoria || "").trim().toLowerCase();
    
    // Verificamos si la categoría está en nuestra lista
    const esCategoriaValida = permitidasMin.includes(catProducto);
    
    // Verificamos si está activo (o si no tiene la propiedad, lo mostramos)
    const estaActivo = p.Activo !== 0;

    return esCategoriaValida && estaActivo;
});

// 4. Limpiar contenedor y mostrar resultados
contenedor.innerHTML = "";

if (filtrados.length === 0) {
    contenedor.innerHTML = `<p style="text-align:center; grid-column: 1/-1;">No se encontraron productos en: ${categoriasABuscar.join(", ")}</p>`;
}

// 5. Renderizar cada producto usando tus nombres de columna exactos
filtrados.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    
    // Usamos p.imagen, p.nombre y p.precio tal como salen en tu consola
    const foto = p.imagen || "https://via.placeholder.com/200?text=Sin+Foto";
    const nombre = p.nombre || "Sin nombre";
    const costo = parseFloat(p.precio || 0);
    const desc = p.caracteristicas ? p.caracteristicas.substring(0, 80) + "..." : "";

    div.innerHTML = `
        <div style="height:150px; display:flex; align-items:center; justify-content:center; margin-bottom:10px;">
            <img src="${foto}" style="max-width:100%; max-height:100%; object-fit:contain; border-radius:5px;">
        </div>
        <h3 style="font-size:14px; height:35px; overflow:hidden;">${nombre}</h3>
        <p style="font-size:11px; color:#666; text-align:left; height:40px; overflow:hidden;">
            ${desc}
        </p>
        <p class="precio">$${costo.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
    `;
    contenedor.appendChild(div);
});

console.log("Filtro finalizado. Mostrando:", filtrados.length, "productos.");
</script>

</body>
</html>
