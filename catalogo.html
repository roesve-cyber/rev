<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Pro — Mueblería Mi Pueblito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Paleta Vibrante */
  --primary: #2563eb;       /* Azul Eléctrico */
  --secondary: #7c3aed;     /* Morado Neón */
  --accent: #06b6d4;        /* Cyan */
  --bg: #ffffff;
  --surface: #f8fafc;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --white: #ffffff;
  --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
  --radius-lg: 24px;
  --radius-md: 16px;
  --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
  --font-t: 'Outfit', sans-serif;
  --font-b: 'Plus Jakarta Sans', sans-serif;
}

body{font-family:var(--font-b);background:var(--bg);color:var(--text-main);overflow-x:hidden}

/* HEADER MODERNO CON CRISTAL */
.site-header{
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(12px);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 80px; border-bottom: 1px solid #e2e8f0; gap: 16px;
}
.header-brand{display:flex;align-items:center;gap:14px}
.header-logo{height:45px;width:45px;border-radius:12px;background:var(--gradient);padding:5px}
.brand-name{font-family:var(--font-t);font-size:22px;font-weight:800;letter-spacing:-0.5px}
.brand-name span{display:block;font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px}

.header-search{flex:1;max-width:400px;position:relative}
.header-search input{
  width:100%; background: var(--surface); border: 2px solid transparent;
  border-radius: 14px; padding: 12px 18px 12px 45px;
  font-family: var(--font-b); font-size: 14px; outline: none;
  transition: all .3s;
}
.header-search input:focus{ border-color: var(--primary); background: var(--white); box-shadow: var(--shadow-sm); }
.search-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)}

/* HERO VIBRANTE */
.hero{
  background: var(--gradient);
  padding: 80px 24px; text-align: center; color: var(--white);
  position: relative; overflow: hidden;
}
.hero::after {
  content: ""; position: absolute; top: -50%; left: -10%; width: 50%; height: 200%;
  background: rgba(255,255,255,0.1); transform: rotate(30deg); pointer-events: none;
}
.hero h1{font-family:var(--font-t);font-size:clamp(40px,8vw,72px);font-weight:800;line-height:1;margin-bottom:15px;letter-spacing:-2px}
.hero p{font-size:18px;opacity:0.9;max-width:500px;margin:0 auto;font-weight:300}

/* FILTROS TIPO CÁPSULA */
.filters-bar{
  padding: 20px 24px; display: flex; gap: 12px; overflow-x: auto;
  background: var(--white); scrollbar-width: none;
}
.filter-btn{
  flex-shrink:0; background: var(--surface); border: none;
  border-radius: 12px; padding: 10px 22px; font-weight: 600;
  color: var(--text-muted); cursor: pointer; transition: all .3s;
}
.filter-btn.active{ background: var(--primary); color: var(--white); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

/* GRID Y TARJETAS */
.main-layout{max-width:1400px;margin:0 auto;padding:20px 24px 80px}
.section-label{
  font-family:var(--font-t);font-size:28px;font-weight:800;margin:40px 0 20px;
  color: var(--text-main); display: flex; align-items: center; gap: 15px;
}
.section-label::after{content:''; height:4px; width:50px; background:var(--accent); border-radius:10px}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:30px}

.card{
  background:var(--white); border-radius:var(--radius-lg); overflow:hidden;
  border: 1px solid #f1f5f9; transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex; flex-direction: column; position: relative;
}
.card:hover{ transform: translateY(-12px); box-shadow: var(--shadow-lg); border-color: var(--primary); }

.card-img-wrap{
  height:250px; display:flex; align-items:center; justify-content:center;
  padding:20px; background: linear-gradient(to bottom, #f8fafc, #ffffff);
}
.card-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition: .5s}
.card:hover .card-img-wrap img{transform: scale(1.1)}

.card-body{padding:20px; flex:1; display:flex; flex-direction:column}
.card-brand{font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase; margin-bottom:8px}
.card-name{font-size:18px; font-weight:700; line-height:1.2; margin-bottom:15px; flex:1}

.card-footer{
  display:flex; align-items:center; justify-content:space-between;
  padding-top:15px; border-top: 1px solid #f1f5f9;
}
.card-price{font-family:var(--font-t); font-size:24px; font-weight:800; color:var(--text-main)}
.card-cta{
  background:var(--primary); color:var(--white); border:none;
  padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor:pointer;
  transition: .3s;
}
.card:hover .card-cta{ background: var(--secondary); transform: scale(1.05); }

/* MODAL MODERNO */
.modal-overlay{
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(15, 23, 42, 0.8); backdrop-filter:blur(15px);
  align-items:center; justify-content:center; padding:20px;
}
.modal-box{
  background:var(--white); border-radius:32px; width:100%; max-width:1100px;
  height: 85vh; display:flex; overflow:hidden; position:relative;
}

.modal-img-side{ flex:1.2; background:var(--surface); display:flex; align-items:center; justify-content:center; padding:40px }
.modal-info-side{ flex:1; overflow-y:auto; padding:50px 40px; display:flex; flex-direction:column }

.precio-block{
  background: var(--surface); border-radius: 24px; padding: 25px;
  margin: 25px 0; border: 2px solid var(--primary);
}
.precio-value{font-family:var(--font-t); font-size:42px; font-weight:800; color:var(--primary)}

.plazo-card{
  background:var(--white); border:2px solid #f1f5f9; border-radius:16px;
  padding:15px; transition: .3s;
}
.plazo-card:hover{ border-color: var(--accent); background: #f0f9ff; }
.plazo-sem{color:var(--secondary); font-weight:800; font-size:12px; text-transform:uppercase}
.plazo-abono{font-size:20px; font-weight:800; margin:4px 0}

.btn-wa{
  background: #22c55e; padding: 18px; border-radius: 16px;
  font-weight: 800; text-align: center; color: white; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: auto;
}

/* RESPONSIVE */
@media(max-width:768px){
  .modal-box{flex-direction:column; height: 95vh; border-radius: 24px 24px 0 0; position:fixed; bottom:0}
  .modal-img-side{height: 300px; flex:none}
  .modal-info-side{padding: 30px 20px}
  .products-grid{grid-template-columns: repeat(2, 1fr); gap: 15px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-brand">
    <div class="header-logo"></div>
    <div class="brand-name">MI PUEBLITO<span>Interior Design</span></div>
  </div>
  <div class="header-search">
    <input id="searchInput" type="search" placeholder="Buscar muebles..." oninput="filtrar()">
  </div>
</header>

<section class="hero">
  <h1>Diseño que<br>vibra contigo</h1>
  <p>Encuentra piezas únicas para transformar tu espacio hoy mismo.</p>
</section>

<div class="filters-bar" id="filtersBar">
  <button class="filter-btn active" onclick="setFiltro('todos',this)">Todo</button>
</div>

<main class="main-layout">
  <div id="catalogoRoot">
    <div class="loading-wrap" style="text-align: center; padding: 100px;">
        <p>Iniciando catálogo vibrante...</p>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="cerrarModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal(null,true)" style="position: absolute; right: 20px; top: 20px; background: var(--text-main); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10;">✕</button>
    <div class="modal-img-side"><img id="modalImg" src="" alt=""></div>
    <div class="modal-info-side">
      <div class="modal-brand" id="mBrand"></div>
      <h2 class="modal-name" id="mName" style="font-family:var(--font-t); font-size:32px; font-weight:800;"></h2>
      <div class="precio-block">
          <div style="font-size:12px; font-weight:700; text-transform:uppercase; color:var(--text-muted)">Precio Contado</div>
          <div class="precio-value" id="mPrecio"></div>
      </div>
      <div id="plazosSection">
          <div style="font-weight:800; margin-bottom:15px; text-transform:uppercase; font-size:12px">Planes de Crédito</div>
          <div class="plazos-grid" id="plazosGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:30px"></div>
      </div>
      <ul id="caractList" style="margin-bottom:30px; list-style:none"></ul>
      <a class="btn-wa" id="btnWA" href="#" target="_blank">Preguntar por WhatsApp</a>
    </div>
  </div>
</div>

<script>
/* Mantenemos la lógica de Firebase y Render que ya tenías, solo ajustamos el renderizado de etiquetas */
const firebaseConfig = {
  apiKey:"AIzaSyALvu7jMIiwJy2zY96fmeQR9M_tLR6mDUI",
  authDomain:"mmpueblito-8fb29.firebaseapp.com",
  projectId:"mmpueblito-8fb29",
  storageBucket:"mmpueblito-8fb29.firebasestorage.app",
  messagingSenderId:"32950655624",
  appId:"1:32950655624:web:42a8657431319f9a25dd3d"
};

let todos = [];
let filtroActivo = 'todos';
let busqueda = '';
const fmt = n => parseFloat(n||0).toLocaleString('es-MX',{minimumFractionDigits:2});

function calcularCredito(precio) {
  const res = []; let prevTotal = 0;
  for (let m = 1; m <= 6; m++) {
    const tasa = m <= 3 ? 0.02 : 0.025;
    const base = precio * (1 + tasa * m);
    const sem  = m * 4;
    let abono  = Math.ceil((base / sem) / 10) * 10;
    let total  = abono * sem;
    let t = 0;
    while (total <= prevTotal && t++ < 100) { abono += 5; total = abono * sem; }
    prevTotal = total;
    res.push({ sem, abono, total });
  }
  return res;
}

async function cargarProductos() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db  = firebase.firestore();
    const doc = await db.collection('posData').doc('productos').get();
    const d = doc.data();
    todos = Array.isArray(d.data) ? d.data : [];
  } catch {
    todos = JSON.parse(localStorage.getItem('productos') || '[]');
  }
  construirFiltros();
  renderCatalogo();
}

function construirFiltros() {
  const subs = new Set();
  todos.filter(p => ['muebles','colchones'].includes((p.categoria||'').toLowerCase()) && p.Activo !== 0)
       .forEach(p => { if (p.subcategoria) subs.add(p.subcategoria); });
  const bar = document.getElementById('filtersBar');
  bar.innerHTML = `<button class="filter-btn active" onclick="setFiltro('todos',this)">Todo</button>`;
  [...subs].sort().forEach(s => {
    const b = document.createElement('button');
    b.className = 'filter-btn'; b.textContent = s;
    b.onclick = function(){ setFiltro(s,this); };
    bar.appendChild(b);
  });
}

function setFiltro(cat, btn) {
  filtroActivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCatalogo();
}

function filtrar() {
  busqueda = document.getElementById('searchInput').value.toLowerCase();
  renderCatalogo();
}

function renderCatalogo() {
  const root = document.getElementById('catalogoRoot');
  const visibles = todos.filter(p => {
    if (!['muebles','colchones'].includes((p.categoria||'').toLowerCase())) return false;
    if (p.Activo === 0) return false;
    if (filtroActivo !== 'todos' && p.subcategoria !== filtroActivo) return false;
    if (busqueda && !(p.nombre||'').toLowerCase().includes(busqueda)) return false;
    return true;
  });

  const grupos = {};
  visibles.forEach(p => {
    const s = p.subcategoria || 'Destacados';
    if (!grupos[s]) grupos[s] = [];
    grupos[s].push(p);
  });

  let html = '';
  Object.keys(grupos).sort().forEach(sub => {
    html += `<h2 class="section-label">${sub}</h2><div class="products-grid">`;
    grupos[sub].forEach(p => {
      html += `
        <div class="card" onclick="abrirModal('${p.id}')">
          <div class="card-img-wrap"><img src="${p.imagen}" loading="lazy"></div>
          <div class="card-body">
            <div class="card-brand">${p.marca || 'Premium'}</div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-footer">
              <div class="card-price">$${fmt(p.precio)}</div>
              <button class="card-cta">Ver</button>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  root.innerHTML = html || '<p style="text-align:center; padding:50px;">No se encontraron productos.</p>';
}

function abrirModal(id) {
  const p = todos.find(x => String(x.id) === String(id));
  if (!p) return;
  const precio = parseFloat(p.precio || 0);

  document.getElementById('modalImg').src = p.imagen;
  document.getElementById('mBrand').textContent = p.marca || 'Premium';
  document.getElementById('mName').textContent  = p.nombre;
  document.getElementById('mPrecio').textContent = `$${fmt(precio)}`;

  const ps = document.getElementById('plazosSection');
  if (precio <= 1) { ps.style.display = 'none'; } 
  else {
    ps.style.display = '';
    document.getElementById('plazosGrid').innerHTML = calcularCredito(precio).map(pl => `
      <div class="plazo-card">
        <div class="plazo-sem">${pl.sem} Semanas</div>
        <div class="plazo-abono">$${pl.abono.toLocaleString()}</div>
        <div class="plazo-total">Total $${pl.total.toLocaleString()}</div>
      </div>`).join('');
  }

  const lineas = (p.caracteristicas || '').split('\n').filter(l => l.trim());
  document.getElementById('caractList').innerHTML = lineas.map(l => `<li style="padding:8px; background:#f8fafc; border-radius:8px; margin-bottom:5px; font-size:14px">⚡ ${l}</li>`).join('');

  const msg = encodeURIComponent(`¡Hola! Me interesa: ${p.nombre}`);
  document.getElementById('btnWA').href = `https://wa.me/?text=${msg}`;
  document.getElementById('modal').classList.add('open');
}

function cerrarModal(e, f) {
  if (f || e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

cargarProductos();
</script>
</body>
</html>
