<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Mueblería Mi Pueblito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf7f2;--warm:#f0e8dc;--espresso:#1a1008;--bark:#3d2b1a;
  --gold:#b8842a;--gold-lt:#e8c97a;--rust:#8b5e3c;
  --text:#2d1e0f;--muted:#7a6555;--white:#ffffff;
  --radius:18px;--ease:cubic-bezier(.4,0,.2,1);
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
.site-header{
  background:var(--espresso);padding:0 24px;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  height:68px;box-shadow:0 2px 20px rgba(26,16,8,.5);gap:16px;
}
.header-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-logo{height:38px;width:38px;object-fit:contain;border-radius:8px}
.header-logo-fallback{
  height:38px;width:38px;background:var(--gold);border-radius:8px;
  display:none;align-items:center;justify-content:center;
  font-family:var(--font-d);font-size:18px;color:var(--espresso);font-weight:900;
}
.brand-name{font-family:var(--font-d);font-size:18px;color:var(--white);line-height:1.1}
.brand-name span{display:block;font-family:var(--font-b);font-size:10px;font-weight:400;color:var(--gold-lt);letter-spacing:2px;text-transform:uppercase}
.header-search{flex:1;max-width:360px;position:relative}
.header-search input{
  width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:50px;padding:9px 18px 9px 42px;color:var(--white);
  font-family:var(--font-b);font-size:14px;outline:none;
  transition:border-color .2s,background .2s;
}
.header-search input::placeholder{color:rgba(255,255,255,.4)}
.header-search input:focus{border-color:var(--gold);background:rgba(255,255,255,.15)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.45);pointer-events:none}
.header-count{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap;flex-shrink:0}
.header-count strong{color:var(--gold-lt)}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--espresso) 0%,var(--bark) 55%,#5a3820 100%);
  padding:64px 24px 72px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%,rgba(184,132,42,.2) 0%,transparent 65%);
  pointer-events:none;
}
.hero-tag{
  display:inline-block;border:1px solid var(--gold);color:var(--gold-lt);
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  padding:5px 18px;border-radius:50px;margin-bottom:18px;font-weight:500;
}
.hero h1{font-family:var(--font-d);font-size:clamp(36px,7vw,64px);color:var(--white);line-height:1.05;margin-bottom:14px}
.hero h1 em{color:var(--gold-lt);font-style:italic}
.hero p{color:rgba(255,255,255,.6);font-size:15px;max-width:420px;margin:0 auto}

/* FILTROS */
.filters-bar{
  background:var(--white);border-bottom:1px solid var(--warm);
  padding:14px 24px;display:flex;align-items:center;gap:10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filters-bar::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;background:var(--cream);border:1.5px solid var(--warm);
  border-radius:50px;padding:7px 18px;font-family:var(--font-b);
  font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:all .2s var(--ease);white-space:nowrap;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--espresso);border-color:var(--espresso);color:var(--white)}

/* MAIN */
.main-layout{max-width:1440px;margin:0 auto;padding:40px 24px 80px}
.section-label{
  font-family:var(--font-d);font-size:26px;color:var(--espresso);
  margin:50px 0 22px;display:flex;align-items:baseline;gap:14px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--warm)}
.section-label .ct{font-family:var(--font-b);font-size:11px;color:var(--muted);font-weight:400;letter-spacing:1px}

/* GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px}

/* CARD */
.card{
  background:var(--white);border-radius:var(--radius);overflow:hidden;
  cursor:pointer;border:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;
  transition:transform .35s var(--ease),box-shadow .35s var(--ease);
  animation:fadeUp .5s var(--ease) both;
}
.card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 24px 48px rgba(26,16,8,.14)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card-img-wrap{
  background:var(--cream);height:220px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:18px;position:relative;
}
.card-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .5s var(--ease)}
.card:hover .card-img-wrap img{transform:scale(1.08)}
.card-badge{
  position:absolute;top:12px;left:12px;
  background:var(--espresso);color:var(--gold-lt);
  font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:50px;
}
.card-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column}
.card-brand{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.card-name{font-family:var(--font-d);font-size:16px;line-height:1.35;color:var(--espresso);margin-bottom:14px;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:flex-end;justify-content:space-between}
.card-price-lbl{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.card-price{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--espresso)}
.card-cta{
  background:var(--espresso);color:var(--white);border:none;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;transition:background .2s,transform .2s;flex-shrink:0;
}
.card:hover .card-cta{background:var(--gold);color:var(--espresso);transform:rotate(45deg)}

/* EMPTY / LOADING */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:16px}
.empty h3{font-family:var(--font-d);font-size:22px;margin-bottom:8px;color:var(--espresso)}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}
.loader{width:44px;height:44px;border:3px solid var(--warm);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(26,16,8,.85);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;animation:fadeIn .2s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--white);border-radius:28px;width:100%;max-width:1060px;
  max-height:92vh;display:flex;overflow:hidden;position:relative;
  box-shadow:0 40px 80px rgba(0,0,0,.45);
  animation:slideUp .3s var(--ease);
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Modal imagen */
.modal-img-side{
  flex:1.1;background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:40px;position:relative;min-height:400px;
}
.modal-img-side img{max-width:100%;max-height:420px;object-fit:contain;cursor:crosshair;transition:transform .08s linear;transform-origin:center}
.zoom-hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(26,16,8,.65);color:rgba(255,255,255,.8);
  font-size:11px;padding:5px 14px;border-radius:50px;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap;
}
.modal-img-side:hover .zoom-hint{opacity:1}

/* Modal info */
.modal-info-side{
  flex:1;overflow-y:auto;padding:48px 36px 36px;
  border-left:1px solid var(--warm);display:flex;flex-direction:column;gap:0;
}
.modal-info-side::-webkit-scrollbar{width:4px}
.modal-info-side::-webkit-scrollbar-thumb{background:var(--warm);border-radius:2px}
.modal-brand{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.modal-name{font-family:var(--font-d);font-size:26px;line-height:1.2;color:var(--espresso);margin-bottom:6px}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:26px}

/* Precio block */
.precio-block{
  background:linear-gradient(135deg,#1a1008 0%,#3d2b1a 100%);
  border-radius:16px;padding:22px 26px;margin-bottom:26px;
  display:flex;align-items:center;justify-content:space-between;
}
.precio-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-lt);margin-bottom:5px}
.precio-value{font-family:var(--font-d);font-size:36px;font-weight:700;color:var(--white)}
.precio-icon{width:50px;height:50px;background:rgba(255,255,255,.1);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}

/* Plazos */
.plazos-section{margin-bottom:26px}
.sec-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--warm)}
.plazos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.plazo-card{
  background:var(--cream);border:1.5px solid var(--warm);border-radius:12px;
  padding:12px 8px;text-align:center;transition:border-color .2s,background .2s;
}
.plazo-card:hover{border-color:var(--gold);background:#fdf8f0}
.plazo-sem{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.plazo-abono{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--espresso);margin-bottom:2px}
.plazo-total{font-size:10px;color:var(--muted)}

/* Características */
.caract-section{margin-bottom:26px}
.caract-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.caract-item{
  display:flex;align-items:flex-start;gap:10px;
  font-size:14px;color:var(--text);
  background:var(--cream);padding:10px 14px;border-radius:10px;line-height:1.4;
}
.caract-item::before{content:'✓';color:var(--gold);font-weight:700;font-size:12px;margin-top:1px;flex-shrink:0}

/* WhatsApp */
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#25d366;color:var(--white);border:none;border-radius:12px;
  padding:14px 20px;font-family:var(--font-b);font-size:14px;font-weight:600;
  cursor:pointer;width:100%;transition:background .2s,transform .15s;text-decoration:none;
}
.btn-wa:hover{background:#1ebe5d;transform:translateY(-1px)}

/* Cerrar */
.modal-close{
  position:absolute;top:18px;right:18px;z-index:10;
  width:38px;height:38px;border-radius:50%;
  background:var(--espresso);color:var(--white);
  border:none;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;
}
.modal-close:hover{background:var(--gold);transform:rotate(90deg)}

/* RESPONSIVE */
@media(max-width:768px){
  .site-header{height:auto;flex-wrap:wrap;padding:12px 16px;gap:8px}
  .header-search{max-width:100%;order:3;flex-basis:100%;margin:0}
  .header-count{display:none}
  .hero{padding:44px 16px 54px}
  .main-layout{padding:24px 16px 60px}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
  .card-img-wrap{height:160px;padding:12px}
  .card-body{padding:12px 14px 14px}
  .card-name{font-size:14px}
  .card-price{font-size:18px}
  .card-cta{width:30px;height:30px;font-size:16px}
  .modal-box{
    flex-direction:column;max-height:96vh;
    position:fixed;bottom:0;left:0;right:0;
    max-width:100%;border-radius:24px 24px 0 0;
    animation:slideModal .3s var(--ease);
  }
  @keyframes slideModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-img-side{height:230px;min-height:unset;flex:none;padding:20px}
  .modal-img-side img{max-height:190px}
  .modal-info-side{padding:22px 20px 28px;border-left:none;border-top:1px solid var(--warm)}
  .modal-name{font-size:22px}
  .precio-value{font-size:28px}
  .plazos-grid{grid-template-columns:repeat(2,1fr)}
  .zoom-hint{display:none}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:repeat(2,1fr);gap:12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-brand">
    <img class="header-logo" src="img/Logo.png" alt="Logo"
         onerror="this.style.display='none';document.querySelector('.header-logo-fallback').style.display='flex'">
    <div class="header-logo-fallback">M</div>
    <div class="brand-name">Mi Pueblito<span>Mueblería</span></div>
  </div>
  <div class="header-search">
    <svg class="search-ico" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="search" placeholder="Buscar muebles, colchones…" oninput="filtrar()">

</header>

<!-- HERO -->
<section class="hero">

  <p>Muebles y colchones de primera selección, con financiamiento a tu medida.</p>
</section>

<!-- FILTROS -->
<div class="filters-bar" id="filtersBar">
  <button class="filter-btn active" onclick="setFiltro('todos',this)">✦ Todo</button>
</div>

<!-- CATÁLOGO -->
<main class="main-layout">
  <div id="catalogoRoot">
    <div class="loading-wrap">
      <div class="loader"></div>
      <p class="loading-text">Cargando catálogo…</p>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="cerrarModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal(null,true)">✕</button>

    <div class="modal-img-side" id="imgSide">
      <img id="modalImg" src="" alt="">
      <div class="zoom-hint">🔍 Pasa el cursor para ampliar</div>
    </div>

    <div class="modal-info-side">
      <div class="modal-brand" id="mBrand"></div>
      <h2 class="modal-name"  id="mName"></h2>
      <p  class="modal-meta"  id="mMeta"></p>

      <div class="precio-block">
        <div>
          <div class="precio-label">Precio de contado</div>
          <div class="precio-value" id="mPrecio"></div>
        </div>
        <div class="precio-icon">🛋️</div>
      </div>

      <div class="plazos-section" id="plazosSection">
        <div class="sec-title">Planes de financiamiento</div>
        <div class="plazos-grid" id="plazosGrid"></div>
      </div>

      <div class="caract-section" id="caractSection" style="display:none">
        <div class="sec-title">Especificaciones</div>
        <ul class="caract-list" id="caractList"></ul>
      </div>

      <a class="btn-wa" id="btnWA" href="#" target="_blank" rel="noopener">

</div>

<script>
/* CONFIG */
const firebaseConfig = {
  apiKey:"AIzaSyALvu7jMIiwJy2zY96fmeQR9M_tLR6mDUI",
  authDomain:"mmpueblito-8fb29.firebaseapp.com",
  projectId:"mmpueblito-8fb29",
  storageBucket:"mmpueblito-8fb29.firebasestorage.app",
  messagingSenderId:"32950655624",
  appId:"1:32950655624:web:42a8657431319f9a25dd3d"
};

let todos = [];
let filtroActivo = 'todos';
let busqueda = '';

const fmt = n => parseFloat(n||0).toLocaleString('es-MX',{minimumFractionDigits:2});

function calcularCredito(precio) {
  const res = []; let prevTotal = 0;
  for (let m = 1; m <= 6; m++) {
    const tasa = m <= 3 ? 0.02 : 0.025;
    const base = precio * (1 + tasa * m);
    const sem  = m * 4;
    let abono  = Math.ceil((base / sem) / 10) * 10;
    let total  = abono * sem;
    let t = 0;
    while (total <= prevTotal && t++ < 100) { abono += 5; total = abono * sem; }
    prevTotal = total;
    res.push({ sem, abono, total });
  }
  return res;
}

async function cargarProductos() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db  = firebase.firestore();
    const doc = await db.collection('posData').doc('productos').get();
    if (!doc.exists) throw new Error('no doc');
    const d = doc.data();
    todos = Array.isArray(d.data) ? d.data : (Array.isArray(d) ? d : []);
  } catch {
    todos = JSON.parse(localStorage.getItem('productos') || '[]');
  }
  construirFiltros();
  renderCatalogo();
}

function construirFiltros() {
  const subs = new Set();
  todos.filter(p => ['muebles','colchones'].includes((p.categoria||'').toLowerCase()) && p.Activo !== 0)
       .forEach(p => { if (p.subcategoria) subs.add(p.subcategoria); });
  const bar = document.getElementById('filtersBar');
  bar.innerHTML = `<button class="filter-btn active" onclick="setFiltro('todos',this)">✦ Todo</button>`;
  [...subs].sort().forEach(s => {
    const b = document.createElement('button');
    b.className = 'filter-btn'; b.textContent = s;
    b.onclick = function(){ setFiltro(s,this); };
    bar.appendChild(b);
  });
}

function setFiltro(cat, btn) {
  filtroActivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCatalogo();
}

function filtrar() {
  busqueda = document.getElementById('searchInput').value.toLowerCase();
  renderCatalogo();
}

function renderCatalogo() {
  const root = document.getElementById('catalogoRoot');
  const visibles = todos.filter(p => {
    if (!['muebles','colchones'].includes((p.categoria||'').toLowerCase())) return false;
    if (p.Activo === 0) return false;
    if (filtroActivo !== 'todos' && p.subcategoria !== filtroActivo) return false;
    if (busqueda && !(p.nombre||'').toLowerCase().includes(busqueda) &&
                    !(p.marca||'').toLowerCase().includes(busqueda)) return false;
    return true;
  });

  document.getElementById('headerCount').innerHTML =
    visibles.length > 0 ? `<strong>${visibles.length}</strong> productos` : '';

  if (visibles.length === 0) {
    root.innerHTML = `<div class="products-grid"><div class="empty">
      <div class="empty-ico">🛋️</div>
      <h3>Sin resultados</h3><p>Intenta con otra búsqueda o categoría</p>
    </div></div>`;
    return;
  }

  const grupos = {};
  visibles.forEach(p => {
    const s = p.subcategoria || 'Otros Modelos';
    if (!grupos[s]) grupos[s] = [];
    grupos[s].push(p);
  });

  let html = ''; let delay = 0;
  Object.keys(grupos).sort().forEach(sub => {
    html += `<h2 class="section-label">${sub}<span class="ct">${grupos[sub].length} artículos</span></h2>
             <div class="products-grid">`;
    grupos[sub].forEach(p => {
      const precio = parseFloat(p.precio || 0);
      const img = p.imagen || '';
      html += `
        <div class="card" onclick="abrirModal('${p.id}')" style="animation-delay:${delay*55}ms">
          <div class="card-img-wrap">
            ${p.marca ? `<div class="card-badge">${p.marca}</div>` : ''}
            <img src="${img}" loading="lazy" alt="${p.nombre}"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23f0e8dc%22 width=%22100%22 height=%22100%22/%3E%3Ctext y=%2260%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2234%22%3E%F0%9F%9B%8B%EF%B8%8F%3C/text%3E%3C/svg%3E'">
          </div>
          <div class="card-body">
            <div class="card-brand">${p.marca || 'Original'}</div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-footer">
              <div>
                <div class="card-price-lbl">Contado</div>
                <div class="card-price">$${fmt(precio)}</div>
              </div>
              <button class="card-cta">+</button>
            </div>
          </div>
        </div>`;
      delay++;
    });
    html += '</div>';
  });
  root.innerHTML = html;
}

function abrirModal(id) {
  const p = todos.find(x => String(x.id) === String(id));
  if (!p) return;
  const precio = parseFloat(p.precio || 0);

  document.getElementById('modalImg').src = p.imagen || '';
  document.getElementById('mBrand').textContent = p.marca || 'Original';
  document.getElementById('mName').textContent  = p.nombre;
  document.getElementById('mMeta').textContent  = [p.categoria, p.subcategoria].filter(Boolean).join(' / ');
  document.getElementById('mPrecio').textContent = `$${fmt(precio)}`;

  // ✅ Plazos ocultos si precio === 1
  const ps = document.getElementById('plazosSection');
  if (precio === 1) {
    ps.style.display = 'none';
  } else {
    ps.style.display = '';
    document.getElementById('plazosGrid').innerHTML = calcularCredito(precio).map(pl => `
      <div class="plazo-card">
        <div class="plazo-sem">${pl.sem} sem</div>
        <div class="plazo-abono">$${pl.abono.toLocaleString()}</div>
        <div class="plazo-total">Total $${pl.total.toLocaleString()}</div>
      </div>`).join('');
  }

  const lineas = (p.caracteristicas || '').split('\n').filter(l => l.trim());
  const cs = document.getElementById('caractSection');
  if (lineas.length > 0) {
    document.getElementById('caractList').innerHTML = lineas.map(l => `<li class="caract-item">${l.trim()}</li>`).join('');
    cs.style.display = '';
  } else {
    cs.style.display = 'none';
  }

  const msg = encodeURIComponent(`Hola! Me interesa el producto: *${p.nombre}* — $${fmt(precio)} 🛋️`);
  document.getElementById('btnWA').href = `https://wa.me/?text=${msg}`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal(e, forzar = false) {
  if (!forzar && e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('modalImg').style.transform = 'scale(1)';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(null, true); });

/* Zoom */
const imgSide = document.getElementById('imgSide');
const imgEl   = document.getElementById('modalImg');
imgSide.addEventListener('mousemove', e => {
  const r = imgSide.getBoundingClientRect();
  imgEl.style.transformOrigin = `${((e.clientX-r.left)/r.width)*100}% ${((e.clientY-r.top)/r.height)*100}%`;
  imgEl.style.transform = 'scale(2.2)';
});
imgSide.addEventListener('mouseleave', () => { imgEl.style.transform = 'scale(1)'; });

cargarProductos();
</script>
</body>
</html>
