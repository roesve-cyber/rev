<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium - Mi Pueblito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #059669;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-dark);
            padding-bottom: 80px;
        }

        /* --- HEADER --- */
        .header-minimal {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .header-minimal img { height: 60px; margin-bottom: 15px; }
        .header-minimal h1 { 
            margin: 0; font-weight: 800; font-size: 32px; letter-spacing: -1px; color: var(--primary);
        }
        .header-minimal p { color: var(--text-light); margin-top: 5px; font-size: 14px; }

        /* --- TÍTULOS DE SECCIÓN --- */
        .seccion-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .seccion-titulo { 
            font-size: 24px; font-weight: 800; color: var(--primary);
            margin: 60px 0 25px 0; display: flex; align-items: center; gap: 15px;
        }
        .seccion-titulo::after {
            content: ""; height: 2px; background: #e2e8f0; flex: 1;
        }

        /* --- GRID DE PRODUCTOS --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        /* --- TARJETA DE PRODUCTO (LOOK PREMIUM) --- */
        .producto { 
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
            display: flex; flex-direction: column;
        }
        
        .producto:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
            border-color: #e2e8f0;
        }

        .img-container { 
            background: #f1f5f9;
            border-radius: 15px;
            height: 240px; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px;
            padding: 20px;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
        .producto:hover .img-container img { transform: scale(1.1); }

        .info-container { padding: 0 10px 10px 10px; text-align: left; }
        .producto h3 { 
            font-size: 16px; font-weight: 600; margin: 0 0 8px 0; 
            height: 42px; overflow: hidden; color: var(--primary);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .marca-tag { font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        
        .precio-tag { 
            font-size: 22px; font-weight: 800; color: var(--text-dark); margin: 10px 0;
            display: flex; align-items: baseline; gap: 4px;
        }
        .precio-tag::before { content: "$"; font-size: 14px; font-weight: 600; }

        .btn-ver {
            background: #f8fafc; color: var(--primary); border: none;
            padding: 10px; border-radius: 10px; font-weight: 600; font-size: 13px;
            margin-top: 10px; transition: 0.3s;
        }
        .producto:hover .btn-ver { background: var(--primary); color: white; }

        /* --- MODAL REDISEÑADO --- */
        .modal { 
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(8px); align-items: center; justify-content: center; 
        }
        .modal-contenido { 
            background: white; border-radius: 30px; width: 95%; max-width: 1200px; 
            height: 90vh; display: flex; overflow: hidden; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .modal-izq { 
            flex: 1.2; background: #fff; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; padding: 40px; position: relative;
        }
        .modal-izq img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; }

        .modal-der { 
            flex: 1; padding: 50px; overflow-y: auto; background: #fff;
            border-left: 1px solid #f1f5f9;
        }

        .modal-der h2 { font-size: 28px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.5px; }
        
        .precio-banner { 
            background: #f0fdf4; padding: 25px; border-radius: 20px; margin: 30px 0; 
            border: 1px solid #dcfce7; text-align: center;
        }
        .precio-banner small { font-weight: 700; color: var(--success); letter-spacing: 1px; }
        
        .tabla-credito { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 15px; }
        .tabla-credito th { color: var(--text-light); font-size: 12px; text-transform: uppercase; padding: 10px; font-weight: 600; }
        .tabla-credito td { background: #f8fafc; padding: 15px; font-size: 15px; }
        .tabla-credito tr td:first-child { border-radius: 12px 0 0 12px; font-weight: 700; color: var(--accent); }
        .tabla-credito tr td:last-child { border-radius: 0 12px 12px 0; font-weight: 600; }

        .cerrar { 
            position: absolute; right: 25px; top: 20px; width: 40px; height: 40px;
            background: #f1f5f9; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .cerrar:hover { background: var(--text-dark); color: white; }

        /* Estilo para las características */
        .caract-item {
            background: #f1f5f9; padding: 10px 15px; border-radius: 10px;
            margin-bottom: 8px; font-size: 14px; list-style: none; display: flex; align-items: center; gap: 10px;
        }
        .caract-item::before { content: "✓"; color: var(--success); font-weight: bold; }

        @media (max-width: 900px) {
            .modal-contenido { flex-direction: column; height: 95vh; }
            .modal-izq { flex: none; height: 40%; padding: 20px; }
            .modal-der { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="header-minimal">
    <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
    <h1>Catálogo Exclusivo</h1>
    <p>Mueblería Mi Pueblito • Calidad para tu hogar</p>
</div>

<div class="seccion-container" id="secciones-catalogo"></div>

<div id="miModal" class="modal">
  <div class="modal-contenido">
    <span class="cerrar" onclick="cerrarModal()">&times;</span>
    <div class="modal-izq" id="contenedorImagenModal">
        <img id="modalImagen" src="">
    </div>
    <div class="modal-der">
      <span id="modalMarca" class="marca-tag">MARCA</span>
      <h2 id="modalNombre"></h2>
      <p id="modalMeta" style="color:var(--text-light); font-size:13px;"></p>
      
      <div class="precio-banner">
          <small>PRECIO DE CONTADO</small>
          <div id="modalPrecio" style="font-size:38px; color:var(--text-dark); font-weight:800; margin-top:5px;"></div>
      </div>

      <h4 style="font-weight:700; margin-bottom:10px;">Planes de Financiamiento</h4>
      <table class="tabla-credito">
          <thead><tr><th>Plazo</th><th>Pago Semanal</th><th>Total</th></tr></thead>
          <tbody id="tablaCuerpo"></tbody>
      </table>

      <div style="margin-top:40px;">
          <h4 style="font-weight:700; border-bottom: 2px solid #f1f5f9; padding-bottom:10px;">Especificaciones</h4>
          <ul id="modalLista" style="padding:0; margin-top:15px;"></ul>
      </div>
    </div>
  </div>
</div>

<script>
// --- SERVICIO DE CÁLCULO ---
const CalculatorService = {
  calcularCredito(precio) {
    let resultados = [];
    let totalAnterior = 0;
    for (let m = 1; m <= 6; m++) {
      let tasa = (m <= 3) ? 0.02 : 0.025;
      let totalBase = precio * (1 + (tasa * m));
      let semanas = m * 4;
      let pagoSemanal = Math.ceil((totalBase / semanas) / 10) * 10;
      let totalFinal = pagoSemanal * semanas;
      let intentos = 0;
      while (totalFinal <= totalAnterior && intentos++ < 100) { pagoSemanal += 5; totalFinal = pagoSemanal * semanas; }
      totalAnterior = totalFinal;
      resultados.push({ semanas, abono: pagoSemanal, total: totalFinal });
    }
    return resultados;
  }
};

const productos = JSON.parse(localStorage.getItem("productos")) || [];
const mainContenedor = document.getElementById("secciones-catalogo");

function renderCategorizado() {
    const filtrados = productos.filter(p => 
        ["muebles", "colchones"].includes((p.categoria || "").toLowerCase()) && p.Activo !== 0
    );

    const grupos = {};
    filtrados.forEach(p => {
        const sub = p.subcategoria || "Otros Modelos";
        if (!grupos[sub]) grupos[sub] = [];
        grupos[sub].push(p);
    });

    let htmlFinal = "";
    const subcategorias = Object.keys(grupos).sort();

    subcategorias.forEach(sub => {
        htmlFinal += `
            <div class="seccion-grupo">
                <h2 class="seccion-titulo">${sub}</h2>
                <div class="grid">
        `;
        
        grupos[sub].forEach(p => {
            htmlFinal += `
                <div class="producto" onclick="verDetalle('${p.id}')">
                    <div class="img-container">
                        <img src="${p.imagen}" loading="lazy">
                    </div>
                    <div class="info-container">
                        <span class="marca-tag">${p.marca || 'Original'}</span>
                        <h3>${p.nombre}</h3>
                        <p class="precio-tag">${parseFloat(p.precio).toLocaleString('es-MX')}</p>
                        <button class="btn-ver">Explorar detalles</button>
                    </div>
                </div>
            `;
        });

        htmlFinal += `</div></div>`;
    });

    mainContenedor.innerHTML = htmlFinal || "<h3 style='text-align:center; padding:100px; color:#94a3b8;'>Próximamente nuevos productos...</h3>";
}

function verDetalle(id) {
    const p = productos.find(item => item.id == id);
    if (!p) return;

    const precio = parseFloat(p.precio || 0);
    document.getElementById("modalImagen").src = p.imagen;
    document.getElementById("modalNombre").innerText = p.nombre;
    document.getElementById("modalMarca").innerText = p.marca || 'Original';
    document.getElementById("modalMeta").innerText = `${p.categoria} / ${p.subcategoria || ''}`;
    document.getElementById("modalPrecio").innerText = `${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;

    const planes = CalculatorService.calcularCredito(precio);
    document.getElementById("tablaCuerpo").innerHTML = planes.map(plan => `
        <tr>
            <td>${plan.semanas} semanas</td>
            <td style="color:var(--text-dark);">$${plan.abono.toLocaleString()}</td>
            <td style="color:var(--text-light);">$${plan.total.toLocaleString()}</td>
        </tr>
    `).join('');

    const lista = document.getElementById("modalLista");
    lista.innerHTML = "";
    const rawCaract = p.caracteristicas || "";
    if (rawCaract) {
        rawCaract.split('\n').filter(l => l.trim()).forEach(linea => {
            const li = document.createElement("li");
            li.className = "caract-item";
            li.innerText = linea.trim();
            lista.appendChild(li);
        });
    }

    document.getElementById("miModal").style.display = "flex";
}

function cerrarModal() { document.getElementById("miModal").style.display = "none"; }

// ZOOM LUPA MEJORADO
const contenedorImg = document.getElementById('contenedorImagenModal');
const imgZoom = document.getElementById('modalImagen');

contenedorImg.addEventListener('mousemove', function(e) {
    const rect = contenedorImg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    imgZoom.style.transformOrigin = `${x}% ${y}%`;
    imgZoom.style.transform = "scale(2)";
});
contenedorImg.addEventListener('mouseleave', () => { imgZoom.style.transform = "scale(1)"; });

renderCategorizado();
</script>
</body>
</html>
