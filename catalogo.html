<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>

  <link rel="stylesheet" href="/estilos.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .producto {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      text-align: center;
    }

    .producto h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .precio {
      font-weight: bold;
      color: green;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1 style="text-align:center;">🛍️ Catálogo de Productos</h1>

<div id="productos" class="grid"></div>

<script>
// 📦 Obtener productos reales del sistema (Aquí ocurre la conexión)
const productos = JSON.parse(localStorage.getItem("productos")) || [];

const contenedor = document.getElementById("productos");

// 👉 CONFIGURA AQUÍ LAS CATEGORÍAS QUE QUIERES MOSTRAR
const categoriasPermitidas = ["Salas", "Recámaras", "Comedores", "Antecomedores", "Roperos", "Comoda", "Comodas", "Camas"];

// 🔍 Filtrar productos (CORREGIDO)
const filtrados = productos.filter(p => {
  // Tomamos la categoría, ya sea que se haya guardado con minúscula o mayúscula
  const catProducto = p.categoria || p.Categoria || "";
  
  return p.Activo !== 0 && categoriasPermitidas.includes(catProducto);
});

// 🧠 Si no hay productos
if (filtrados.length === 0) {
  contenedor.innerHTML = "<p style='text-align:center;'>No hay productos disponibles en estas categorías.</p>";
}

// 🎯 Mostrar productos
filtrados.forEach(p => {
  const div = document.createElement("div");
  div.className = "producto";
  
  // Usar imagen del producto o una por defecto si no tiene
  const foto = p.imagen || "https://via.placeholder.com/200?text=Sin+Foto";
  
  // Convertir los saltos de línea para que se vean bien en el catálogo
  const textoCaracteristicas = p.caracteristicas 
        ? p.caracteristicas.replace(/\n/g, '<br>') 
        : '<em>Sin detalles adicionales</em>';

  div.innerHTML = `
    <div style="height:150px; display:flex; align-items:center; justify-content:center; margin-bottom:10px;">
        <img src="${foto}" style="max-width:100%; max-height:100%; object-fit:contain; border-radius:5px;">
    </div>
    <h3>${p.nombre || p.Nombre}</h3>
    <div style="font-size:12px; color:#666; margin:10px 0; text-align:left; border-top:1px solid #eee; padding-top:5px;">
        ${textoCaracteristicas}
    </div>
    <p class="precio">$${parseFloat(p.precio || p.Precio_Contado || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
  `;
  contenedor.appendChild(div);
});
</script>

</body>
</html>
