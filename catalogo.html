<!DOCTYPE html>
<html lang="es">

<script>
// Normaliza cadenas para comparar nombres de categorías/subcategorías (sin tildes, mayúsculas ni espacios)
function normalizarNombre(str) {
  return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '');
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUEBLERIA MI PUEBLITO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --primary: #1a2a27; --accent: #b8842a; --bg-cream: #faf7f2; --white: #ffffff;
  --font-main: 'Inter', sans-serif; --font-title: 'Montserrat', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-main); background-color: var(--bg-cream); color: #1a1a1a; -webkit-tap-highlight-color: transparent; }

/* HEADER & HERO */
.site-header {
  background: var(--white); padding: 12px 20px; display: flex;
  justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
  position: sticky; top: 0; z-index: 1000;
}
.brand h1 { font-family: var(--font-title); font-size: 16px; color: var(--primary); }

.hero-slim {
  padding: 25px 15px; background: #111; color: white; text-align: center;
  background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&q=80&w=1500');
  background-size: cover; background-position: center;
}
.hero-slim h2 { font-family: var(--font-title); font-size: 22px; margin-bottom: 5px; }
.hero-slim p { font-size: 14px; opacity: 0.9; }

/* FILTROS */
.filter-section { padding: 15px 10px; max-width: 1400px; margin: 0 auto; text-align: center; }
.cat-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
.cat-container::-webkit-scrollbar { display: none; }

.cat-btn {
  padding: 8px 18px; border-radius: 50px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-weight: 600; font-size: 13px;
  white-space: nowrap; transition: 0.3s; flex-shrink: 0;
}
.cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.subnav { 
  display: none; justify-content: flex-start; overflow-x: auto; gap: 8px; 
  margin-top: 5px; padding: 10px 0; border-top: 1px solid #eee;
}
.subnav.visible { display: flex; }
.sub-pill {
  padding: 6px 14px; background: #eee; border-radius: 20px; font-size: 11px;
  cursor: pointer; font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.sub-pill.active { background: var(--accent); color: white; }

/* CATALOGO */
.catalog-container { max-width: 1400px; margin: 0 auto; padding: 0 15px 60px; }
.grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
  gap: 20px; 
}

.card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
.card-img { width: 100%; height: 260px; padding: 15px; display: flex; align-items: center; justify-content: center; background: #fff; }
.card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.card-body { padding: 15px; flex-grow: 1; border-top: 1px solid #f5f5f5; }
.card-body h3 { font-size: 15px; color: #333; margin-bottom: 8px; line-height: 1.4; font-weight: 600; word-wrap: break-word; }
.card-price { font-size: 18px; font-weight: 800; color: var(--primary); }

/* MODAL */
.modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
  z-index: 2000; align-items: center; justify-content: center;
}
.modal.open { display: flex; }
.modal-content {
  background: white; width: 100%; max-width: 950px; border-radius: 0; 
  display: flex; flex-direction: column; overflow-y: auto; position: relative; height: 100%;
}
.modal-left { width: 100%; background: #fff; height: 350px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.modal-left img { max-width: 90%; max-height: 90%; transition: transform 0.1s ease; }
.modal-right { padding: 25px; }

.periodicidad-select {
  width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px;
}
.plazo-row {
  display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee;
}

.btn-wa {
  display: block; width: 100%; background: #25d366; color: white; text-align: center;
  padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 20px; font-size: 16px;
}

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .card-img { height: 320px; }
  .modal-content { height: 100%; max-height: 100%; border-radius: 0; }
}

@media (min-width: 900px) {
  .modal-content { flex-direction: row; height: auto; max-height: 90vh; border-radius: 20px; }
  .modal-left { width: 55%; height: auto; min-height: 500px; }
  .modal-right { width: 45%; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand"><h1>MUEBLERIA MI PUEBLITO</h1></div>
</header>

<section class="hero-slim">
  <h2>Tu hogar, tu estilo.</h2>
  <p>Encuentra los mejores muebles con abonos que sí puedes.</p>
</section>

<div class="filter-section">
  <div id="categoriasNav" class="cat-container">
    <button class="cat-btn active" onclick="setCategoria('todos', this)">Todos los productos</button>
  </div>
  <div id="subnav" class="subnav"></div>
</div>

<main class="catalog-container">
  <div id="grid" class="grid"></div>
</main>

<div class="modal" id="modal" onclick="if(event.target==this) cerrarModal()">
  <div class="modal-content">
    <button onclick="cerrarModal()" style="position:absolute; top:15px; right:15px; border:none; background:rgba(0,0,0,0.1); width:36px; height:36px; border-radius:50%; cursor:pointer; z-index:10; font-weight:bold; font-size:18px;">✕</button>
    <div class="modal-left" id="zoomC" onmousemove="zoom(event)" onmouseleave="resetZoom()" ontouchmove="zoom(event)">
      <img id="mImg" src="">
    </div>
    <div class="modal-right">
      <h2 id="mTitle" style="font-family:var(--font-title); font-size: 20px; line-height: 1.2;"></h2>
      <div id="mPrice" style="font-size:22px; font-weight:800; color:var(--primary); margin:10px 0;"></div>
      <div id="mCaracteristicas" style="margin: 15px 0; color: #555; font-size: 15px;"></div>
      <button id="btnCaracteristicas" type="button" style="display:none;margin-bottom:15px;width:100%;padding:12px 0;background:var(--accent);color:#fff;font-weight:700;font-size:16px;border:none;border-radius:8px;" onclick="window.mostrarBurbujaCaracteristicas()">Características</button>
      <div id="burbujaCaracteristicas" style="display:none;position:fixed;z-index:3000;left:0;right:0;bottom:0;margin:auto;max-width:95vw;background:#fff9e6;padding:18px 16px 18px 16px;border-radius:18px 18px 0 0;box-shadow:0 -2px 16px #0002;font-size:16px;color:#444;line-height:1.7;"></div>
      
      <div style="font-size:11px; font-weight:700; color:#666;">ELIGE TU FORMA DE PAGO:</div>
      <select id="periodoSelect" class="periodicidad-select" onchange="actualizarPlazos()">
        <option value="semanal">Abono Semanal</option>
        <option value="quincenal">Abono Quincenal</option>
        <option value="mensual">Abono Mensual</option>
      </select>

      <div id="plazosLista"></div>
      <a id="btnWA" href="#" target="_blank" class="btn-wa">Consultar por WhatsApp</a>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyALvu7jMIiwJy2zY96fmeQR9M_tLR6mDUI",
  authDomain: "mmpueblito-8fb29.firebaseapp.com",
  projectId: "mmpueblito-8fb29",
  storageBucket: "mmpueblito-8fb29.firebasestorage.app",
  messagingSenderId: "32950655624",
  appId: "1:32950655624:web:42a8657431319f9a25dd3d"
};

let productos = [];
let catActiva = 'todos';
let subActiva = 'todos';
let prodSeleccionado = null;

// --- MOTOR DE ORDENAMIENTO PARA EL CATÁLOGO ---
function ordenarProductosCatalogo(productosArray, subcatSeleccionada) {
    let regla = 'nombre_asc';
    try {
        const catData = JSON.parse(localStorage.getItem("categoriasData")) || [];
        for (let cat of catData) {
            let sub = (cat.subcategorias || []).find(s => s.nombre === subcatSeleccionada);
            if (sub && sub.orden) { regla = sub.orden; break; }
        }
    } catch(e) {}

    return [...productosArray].sort((a, b) => {
        if (regla === 'nombre_asc') return (a.nombre || '').localeCompare(b.nombre || '');
        if (regla === 'nombre_desc') return (b.nombre || '').localeCompare(a.nombre || '');
        if (regla === 'precio_asc') return (parseFloat(a.precio) || 0) - (parseFloat(b.precio) || 0);
        if (regla === 'precio_desc') return (parseFloat(b.precio) || 0) - (parseFloat(a.precio) || 0);
        if (regla === 'stock_desc') return (parseFloat(b.stock) || 0) - (parseFloat(a.stock) || 0);
        return 0;
    });
}

// FORMATEO FORZADO A PESOS MEXICANOS
const fmt = (n) => parseFloat(n || 0).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

const LogicaCredito = {
    calcularCredito(precioContado, enganchePersonalizado = null) {
      const engancheBase = precioContado * 0.10;
      const engancheRedondeado = Math.ceil(engancheBase / 10) * 10;
      const enganche = (typeof enganchePersonalizado === 'number' && enganchePersonalizado >= engancheRedondeado) ? enganchePersonalizado : engancheRedondeado;
      const saldoAFinanciar = precioContado - enganche;

      // 1. LEER CONFIGURACIÓN GLOBAL
      let config = null;
      try { config = JSON.parse(localStorage.getItem('configCreditoGlobal')); } catch(e){}

      let plazosConfig = [];
      if (!config || !config.plazos || config.plazos.length === 0) {
          for (let i = 1; i <= 6; i++) plazosConfig.push({ meses: i, tasa: (i <= 3) ? 2 : 2.5 });
      } else {
          plazosConfig = config.plazos;
      }
      plazosConfig.sort((a, b) => a.meses - b.meses);

      // 2. LEER REGLA ESPECÍFICA DEL PRODUCTO (Si aplica)
      if (typeof prodSeleccionado !== 'undefined' && prodSeleccionado && prodSeleccionado.configCredito && prodSeleccionado.configCredito.usaReglaGlobal === false) {
          if (prodSeleccionado.configCredito.permitirCredito === false) return []; // Bloqueado para crédito
          plazosConfig = prodSeleccionado.configCredito.plazos || [];
          plazosConfig.sort((a, b) => a.meses - b.meses);
      }

      let resultados = [];
      let totalAnterior = 0;

      // 3. CÁLCULO
      plazosConfig.forEach(plazoObj => {
        let m = plazoObj.meses;
        let tasaDecimal = plazoObj.tasa / 100;
        let totalBase = saldoAFinanciar * (1 + (tasaDecimal * m));
        let semanas = m * 4;
        let pagoSemanal = totalBase / semanas;
        
        pagoSemanal = Math.ceil(pagoSemanal / 10) * 10;
        let totalFinal = (pagoSemanal * semanas) + enganche;

        let intentos = 0;
        while (totalFinal <= totalAnterior && intentos++ < 100) {
          pagoSemanal += 5;
          totalFinal = (pagoSemanal * semanas) + enganche;
        }
        if (intentos >= 100) return;
        
        totalAnterior = totalFinal;
        resultados.push({ 
          meses: m, 
          semanas, 
          abono: pagoSemanal, 
          total: totalFinal,
          enganche
        });
      });
      return resultados;
    },

    calcularConPeriodicidad(precio, periodicidad = 'semanal', enganchePersonalizado = null) {
      const planes = this.calcularCredito(precio, enganchePersonalizado);
      let mult = 1;
      if (periodicidad === 'quincenal') mult = 2;
      if (periodicidad === 'mensual') mult = 4;
      return planes.map(plan => ({
        meses: plan.meses,
        pagos: Math.round(plan.semanas / mult),
        abono: plan.abono * mult,
        enganche: plan.enganche
      }));
    }
};

async function inicializar() {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const doc = await firebase.firestore().collection('posData').doc('productos').get();
  productos = (doc.data().data || []).filter(p => p.Activo != 0);
  
  generarMenuCategorias();
  render();
}

function generarMenuCategorias() {
  var nav = document.getElementById('categoriasNav');
  nav.innerHTML = '<button class="cat-btn active" onclick="setCategoria(\'todos\', this)">Todos los productos</button>';
  
  var categoriasData = [];
  try {
    categoriasData = JSON.parse(localStorage.getItem("categoriasData")) || [];
  } catch(e) {}
  
  var catsConProductos = [];
  for (var i = 0; i < categoriasData.length; i++) {
    var catNombre = categoriasData[i].nombre;
    var tieneProducto = false;
    for (var k = 0; k < productos.length; k++) {
      if (normalizarNombre(productos[k].categoria || "Varios") === normalizarNombre(catNombre)) {
        tieneProducto = true;
        break;
      }
    }
    if (tieneProducto) {
      catsConProductos.push({
        nombre: catNombre,
        posicion: categoriasData[i].posicion || 999
      });
    }
  }
  
  catsConProductos.sort(function(a, b) { return a.posicion - b.posicion; });
  
  for (var j = 0; j < catsConProductos.length; j++) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = catsConProductos[j].nombre;
    btn.onclick = (function(c) { return function() { setCategoria(c, btn); }; })(catsConProductos[j].nombre);
    nav.appendChild(btn);
  }
}

function setCategoria(c, btn) {
  catActiva = c;
  subActiva = 'todos';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  var subnav = document.getElementById('subnav');
  if (c === 'todos') {
    subnav.classList.remove('visible');
  } else {
    var categoriasData = [];
    try {
      categoriasData = JSON.parse(localStorage.getItem("categoriasData")) || [];
    } catch(e) {}
    
    var catObj = null;
    for (var i = 0; i < categoriasData.length; i++) {
      if (normalizarNombre(categoriasData[i].nombre) === normalizarNombre(c)) {
        catObj = categoriasData[i];
        break;
      }
    }
    
    var subsConProductos = [];
    if (catObj && catObj.subcategorias) {
      for (var s = 0; s < catObj.subcategorias.length; s++) {
        var subNombre = catObj.subcategorias[s].nombre;
        var tieneProducto = false;
        for (var p = 0; p < productos.length; p++) {
          if (normalizarNombre(productos[p].categoria || "Varios") === normalizarNombre(c) && 
              normalizarNombre(productos[p].subcategoria) === normalizarNombre(subNombre)) {
            tieneProducto = true;
            break;
          }
        }
        if (tieneProducto) {
          subsConProductos.push({
            nombre: subNombre,
            posicion: catObj.subcategorias[s].posicion || 999
          });
        }
      }
    }
    
    subsConProductos.sort(function(a, b) { return a.posicion - b.posicion; });
    
    if (subsConProductos.length > 0) {
      var html = '<div class="sub-pill active" onclick="setSub(\'todos\', this)">Ver Todo</div>';
      for (var j = 0; j < subsConProductos.length; j++) {
        html += '<div class="sub-pill" onclick="setSub(\'' + subsConProductos[j].nombre + '\', this)">' + subsConProductos[j].nombre + '</div>';
      }
      subnav.innerHTML = html;
      subnav.classList.add('visible');
    } else {
      subnav.classList.remove('visible');
    }
  }
  render();
}

function setSub(s, pill) {
  subActiva = s;
  document.querySelectorAll('.sub-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  render();
}

function render() {
  const grid = document.getElementById('grid');
  
  // 1. Filtrar por categoría y subcategoría
  let filtrados = productos.filter(p => {
    const matchCat = catActiva === 'todos' || p.categoria === catActiva;
    const matchSub = subActiva === 'todos' || p.subcategoria === subActiva;
    return matchCat && matchSub;
  });
  
  // 2. Aplicar ordenamiento inteligente antes de dibujar
  filtrados = ordenarProductosCatalogo(filtrados, subActiva);
  
  // 3. Dibujar tarjetas
  grid.innerHTML = filtrados.map(p => `
    <div class="card" onclick="abrirModal('${p.id}')">
      <div class="card-img"><img src="${p.imagen}" loading="lazy"></div>
      <div class="card-body">
        <h3>${p.nombre}</h3>
        <div class="card-price">${fmt(p.precio)} <span style="font-size:10px; color:#999; font-weight:400;">MXN CONTADO</span></div>
      </div>
    </div>
  `).join('');
}

function abrirModal(id) {
  prodSeleccionado = productos.find(x => x.id == id);
  document.getElementById('mImg').src = prodSeleccionado.imagen;
  document.getElementById('mTitle').textContent = prodSeleccionado.nombre;
  document.getElementById('mPrice').textContent = fmt(prodSeleccionado.precio) + " de contado";
  document.getElementById('periodoSelect').value = 'semanal';
  // Mostrar características si existen, con formato destacado
  // Mostrar características según dispositivo
  const esMovil = window.matchMedia('(max-width: 600px)').matches;
  const mCar = document.getElementById('mCaracteristicas');
  const btnCar = document.getElementById('btnCaracteristicas');
  const burbuja = document.getElementById('burbujaCaracteristicas');
  if (prodSeleccionado.caracteristicas) {
    if (esMovil) {
      mCar.style.display = 'none';
      btnCar.style.display = 'block';
      burbuja.style.display = 'none';
      burbuja.innerHTML = `<b>Características:</b><br>${prodSeleccionado.caracteristicas}<br><button onclick='window.ocultarBurbujaCaracteristicas()' style='margin-top:18px;padding:8px 18px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:15px;'>Cerrar</button>`;
    } else {
      mCar.style.display = '';
      btnCar.style.display = 'none';
      burbuja.style.display = 'none';
      mCar.innerHTML = `<div style='background:#f8fafc;padding:12px 15px;border-radius:8px;line-height:1.6;'>${prodSeleccionado.caracteristicas}</div>`;
    }
  } else {
    mCar.style.display = 'none';
    btnCar.style.display = 'none';
    burbuja.style.display = 'none';
  }
  window.mostrarBurbujaCaracteristicas = function() {
    document.getElementById('burbujaCaracteristicas').style.display = '';
  }
  window.ocultarBurbujaCaracteristicas = function() {
    document.getElementById('burbujaCaracteristicas').style.display = 'none';
  }
  actualizarPlazos();
  
  const msg = encodeURIComponent(`Hola! Me interesa: ${prodSeleccionado.nombre} (${fmt(prodSeleccionado.precio)})`);
  document.getElementById('btnWA').href = `https://wa.me/522411081657?text=${msg}`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function actualizarPlazos() {
    const periodicidad = document.getElementById('periodoSelect').value;
    const precio = parseFloat(prodSeleccionado.precio);
    // Tomar el enganche editado si existe
    let engancheEdit = parseFloat(document.getElementById('inputEnganche')?.value);
    if (isNaN(engancheEdit)) engancheEdit = undefined;
    const plazos = LogicaCredito.calcularConPeriodicidad(precio, periodicidad, engancheEdit);
    const engancheBase = plazos[0].enganche;
    // Si el input fue menor al mínimo, forzar el mínimo
    if (engancheEdit !== undefined && engancheEdit < engancheBase) engancheEdit = engancheBase;

    document.getElementById('plazosLista').innerHTML = `
    <div style="background: #fff9e6; padding: 12px; border-radius: 8px; border: 1px dashed var(--accent); margin-bottom: 15px; text-align: center;">
      <span style="font-size: 12px; color: #666; display: block; text-transform: uppercase; font-weight: 700;">Pago Inicial (Enganche)</span>
      <input id="inputEnganche" type="number" min="${engancheBase}" value="${engancheEdit ?? engancheBase}" style="font-size:22px;font-weight:800;color:var(--primary);text-align:center;width:120px;padding:4px 8px;border:2px solid var(--accent);border-radius:8px;margin:8px 0 0 0;outline:none;" onchange="if(parseFloat(this.value)<${engancheBase}){this.value=${engancheBase};alert('El enganche no puede ser menor a ${fmt(engancheBase)}');} actualizarPlazos();">
      <div style="font-size:12px;color:#b8842a;margin-top:4px;">Mínimo: ${fmt(engancheBase)}</div>
    </div>
    <div style="font-size:11px; font-weight:700; color:#666; display:block; margin-bottom:8px;">PLANES DISPONIBLES:</div>
    ${plazos.map(pl => `
      <div class="plazo-row">
        <span><strong>${pl.pagos}</strong> pagos de <strong>${fmt(pl.abono)}</strong></span>
        <span style="font-size:11px; color:var(--accent); font-weight:700;">${pl.meses} MESES</span>
      </div>
    `).join('')}
    `;
}

function cerrarModal() { 
  document.getElementById('modal').classList.remove('open'); 
  document.body.style.overflow = 'auto';
}

function zoom(e) {
  const container = document.getElementById('zoomC');
  const img = document.getElementById('mImg');
  const rect = container.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  img.style.transformOrigin = `${((clientX - rect.left)/rect.width)*100}% ${((clientY - rect.top)/rect.height)*100}%`;
  img.style.transform = "scale(2)";
}
function resetZoom() { document.getElementById('mImg').style.transform = "scale(1)"; }

inicializar();
</script>
</body>
</html>
